name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Build/test on the latest stable Go, NOT the exact `go 1.25.0` pinned in go.mod.
          # govulncheck reports stdlib advisories against the toolchain it runs under, so an
          # exact-pinned (and quickly stale) patch version makes CI red as stdlib CVEs accrue.
          # `stable` always carries the latest stdlib security patches. go.mod still declares
          # the 1.25 *minimum* for users.
          go-version: 'stable'
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "::error::unformatted files:"; echo "$out"; exit 1; fi

      - name: Test (race)
        run: go test -race -count=1 ./...

      - name: JS syntax check
        run: node --check cmd/am/web/app.js

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
